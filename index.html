<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#111827" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Nutrition" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<link rel="stylesheet" href="./styles.css" />
<title>Nutrition Tracker v3.0.1</title>
</head>
<body>
<div class="app">
  <header class="header">
    <h1 data-i18n="title">Nutrition Tracker</h1>
    <p id="dateLabel"></p>
  </header>

  <section id="tab-dashboard" class="section active">
    <div class="card dateCard">
      <div class="dateRow">
        <input id="currentDate" type="date">
        <button class="gray" id="todayBtn" data-i18n="todayBtn">今天</button>
      </div>
    </div>

    <div class="card summaryCard">
      <div class="summaryStatus" id="summaryTitle"></div>
      <p id="summaryText"></p>
    </div>

    <div class="card">
      <div class="dashboardTitle">
        <h2 data-i18n="dashboard">Dashboard</h2>
        <span data-i18n="rangeHint">理想區間追蹤</span>
      </div>
      <div class="metricGrid" id="metrics"></div>
    </div>

    <div id="mealList"></div>
  </section>

  <section id="tab-history" class="section">
    <div class="card">
      <h2 data-i18n="history">歷史紀錄</h2>
      <p class="small" data-i18n="historyNote">只顯示有紀錄的日期，點進去查看詳細內容。</p>
      <div id="historyList"></div>
    </div>
  </section>

  <section id="tab-weight" class="section">
    <div class="card">
      <h2 data-i18n="weight">體重</h2>
      <label data-i18n="todayWeight">今日體重 kg</label>
      <input id="weightInput" type="number" step="0.1" placeholder="69.5">
      <br><br>
      <button id="saveWeightBtn" data-i18n="save">儲存</button>
    </div>
    <div class="card">
      <h2 data-i18n="recentWeight">近期體重</h2>
      <div id="weightList"></div>
    </div>
  </section>

  <section id="tab-settings" class="section">
    <div class="card">
      <h2 data-i18n="settings">設定</h2>
      <label>Language</label>
      <select id="langSelect">
        <option value="zh">中文</option>
        <option value="id">Bahasa Indonesia</option>
      </select>
      <p class="small" data-i18n="rangeNote">每項營養素只需要設定：最低值、理想上限。</p>
      <div id="rangeSettings"></div>
      <br>
      <button id="saveRangesBtn" data-i18n="saveTarget">儲存目標區間</button>
    </div>
  </section>

  <section id="tab-backup" class="section">
    <div class="card">
      <h2 data-i18n="backup">備份</h2>
      <div class="dataStats" id="dataStats"></div>
      <br>
      <button id="exportBtn" data-i18n="export">匯出 JSON</button>
      <div class="importBox">
        <label data-i18n="import">匯入 JSON</label>
        <input id="importFile" type="file" accept=".json,application/json">
        <p class="small" data-i18n="importNote">選擇之前匯出的 JSON 檔，會覆蓋目前 App 內的資料。</p>
      </div>
      <br>
      <button class="red" id="clearAllBtn" data-i18n="clearAll">清除全部資料</button>
      <p class="small" data-i18n="backupNote">資料儲存在本機瀏覽器，請定期備份。</p>
    </div>
  </section>
</div>

<button class="fab" id="openSheetBtn">＋</button>
<div class="updateBanner" id="updateBanner"><span>有新版本可用</span><button id="reloadBtn">立即更新</button></div>
<div class="toast" id="toast"></div>

<div class="sheetBg" id="sheetBg">
  <div class="sheet">
    <div class="sheetHandle"></div>
    <div class="sheetHead">
      <h2 data-i18n="addFood">新增食物</h2>
      <button class="gray" id="closeSheetBtn">✕</button>
    </div>
    <input type="hidden" id="editId">

    <label data-i18n="meal">餐別</label>
    <select id="meal" class="foodInput">
      <option value="breakfast" data-i18n="breakfast">早餐</option>
      <option value="lunch" data-i18n="lunch">午餐</option>
      <option value="dinner" data-i18n="dinner">晚餐</option>
      <option value="snack" data-i18n="snack">點心</option>
    </select>

    <br><br>
    <label data-i18n="foodName">食物名稱</label>
    <input id="foodName" class="foodInput">

    <br><br>
    <div class="rangeGrid">
      <div><label data-i18n="weightG">重量 g</label><input id="foodWeight" class="foodInput" type="number" step="0.1"></div>
      <div><label data-i18n="cal">熱量</label><input id="foodCal" class="foodInput" type="number" step="0.1"></div>
      <div><label data-i18n="protein">蛋白質</label><input id="foodPro" class="foodInput" type="number" step="0.1"></div>
      <div><label data-i18n="carbs">碳水</label><input id="foodCarb" class="foodInput" type="number" step="0.1"></div>
      <div><label data-i18n="fat">脂肪</label><input id="foodFat" class="foodInput" type="number" step="0.1"></div>
      <div><label data-i18n="note">備註</label><input id="foodNote" class="foodInput"></div>
    </div>
    <br>
    <button id="saveFoodBtn" data-i18n="add">加入</button>
  </div>
</div>

<nav class="bottomNav">
  <div class="bottomNavInner">
    <button class="navBtn active" data-tab="dashboard" data-i18n="navHome">首頁</button>
    <button class="navBtn" data-tab="history" data-i18n="navHistory">歷史</button>
    <button class="navBtn" data-tab="weight" data-i18n="navWeight">體重</button>
    <button class="navBtn" data-tab="settings" data-i18n="navSettings">設定</button>
    <button class="navBtn" data-tab="backup" data-i18n="navBackup">備份</button>
  </div>
</nav>

<script src="./i18n.js"></script>
<script src="./storage.js"></script>
<script src="./utils.js"></script>
<script src="./app.js"></script>
</body>
</html>
