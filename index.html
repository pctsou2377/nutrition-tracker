<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="營養追蹤" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <title>營養追蹤 PWA</title>
  <style>
    :root{--blue:#2563eb;--green:#16a34a;--red:#dc2626;--bg:#f3f4f6;--card:#fff;--text:#111827;--muted:#6b7280}
    body{font-family:Arial,"Noto Sans TC",sans-serif;background:var(--bg);margin:0;color:var(--text)}
    header{background:var(--blue);color:#fff;padding:18px 16px;text-align:center;position:sticky;top:0;z-index:10}
    header h1{margin:0;font-size:22px}
    main{max-width:920px;margin:auto;padding:16px}
    .card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
    label{font-weight:700;font-size:14px;margin-bottom:4px;display:block}
    input,select,button{width:100%;box-sizing:border-box;padding:11px;border-radius:10px;border:1px solid #d1d5db;font-size:15px}
    button{cursor:pointer;background:var(--blue);color:#fff;border:none;font-weight:700}
    button.gray{background:#6b7280}
    button.red{background:var(--red)}
    button.smallbtn{padding:7px;font-size:13px}
    .progress{height:18px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin:7px 0}
    .fill{height:100%;background:var(--green);width:0%}
    .over{color:var(--red);font-weight:700}
    .ok{color:var(--green);font-weight:700}
    .muted{color:var(--muted);font-size:13px;line-height:1.5}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{padding:8px;border-bottom:1px solid #e5e7eb;text-align:center}
    .tabs{display:flex;gap:8px;margin-bottom:14px}
    .tabs button{background:#e5e7eb;color:#111827}
    .tabs button.active{background:var(--blue);color:#fff}
    .section{display:none}
    .section.active{display:block}
  </style>
</head>
<body>
<header>
  <h1>營養追蹤 PWA</h1>
</header>

<main>
  <div class="tabs">
    <button class="active" onclick="showTab('today', this)">今日</button>
    <button onclick="showTab('weight', this)">體重</button>
    <button onclick="showTab('backup', this)">備份</button>
  </div>

  <section id="today" class="section active">
    <div class="card">
      <h2>每日目標</h2>
      <div class="grid">
        <div><label>目標</label><select id="goal"><option value="fatloss">減脂</option><option value="muscle">增肌</option><option value="maintain">維持體重</option></select></div>
        <div><label>熱量 kcal</label><input id="tCal" type="number" value="1800"></div>
        <div><label>蛋白質 g</label><input id="tPro" type="number" value="100"></div>
        <div><label>碳水 g</label><input id="tCarb" type="number" value="200"></div>
        <div><label>脂肪 g</label><input id="tFat" type="number" value="55"></div>
      </div>
      <p class="muted">目標會自動儲存在這台裝置的瀏覽器中。</p>
    </div>

    <div class="card">
      <h2>新增食物</h2>
      <div class="grid">
        <input id="name" placeholder="食物名稱">
        <input id="cal" type="number" placeholder="熱量 kcal">
        <input id="pro" type="number" placeholder="蛋白質 g">
        <input id="carb" type="number" placeholder="碳水 g">
        <input id="fat" type="number" placeholder="脂肪 g">
      </div>
      <br>
      <button onclick="addFood()">加入今日飲食</button>
    </div>

    <div class="card">
      <h2>今日 Dashboard</h2>
      <div id="stats"></div>
    </div>

    <div class="card">
      <h2>今日飲食紀錄</h2>
      <table>
        <thead><tr><th>食物</th><th>熱量</th><th>P</th><th>C</th><th>F</th><th></th></tr></thead>
        <tbody id="foods"></tbody>
      </table>
      <br>
      <button class="red" onclick="clearFoods()">清空今日飲食</button>
    </div>
  </section>

  <section id="weight" class="section">
    <div class="card">
      <h2>體重紀錄</h2>
      <div class="grid">
        <input id="weightInput" type="number" step="0.1" placeholder="今日體重 kg">
        <button onclick="saveWeight()">儲存今日體重</button>
      </div>
      <br>
      <div id="weightList"></div>
    </div>
  </section>

  <section id="backup" class="section">
    <div class="card">
      <h2>資料備份</h2>
      <div class="grid">
        <button class="gray" onclick="exportData()">匯出 JSON 備份</button>
        <button class="red" onclick="clearAll()">清除全部資料</button>
      </div>
      <p class="muted">資料儲存在本機瀏覽器。更換手機、清除 Safari 網站資料或使用無痕模式，資料可能消失。建議定期匯出備份。</p>
    </div>
  </section>
</main>

<script>
const storeKey = "nutrition_pwa_v1";
let state = JSON.parse(localStorage.getItem(storeKey) || "{}");
state.foods ||= [];
state.weights ||= [];
state.targets ||= {goal:"fatloss", cal:1800, pro:100, carb:200, fat:55};

function save(){ localStorage.setItem(storeKey, JSON.stringify(state)); }
function val(id){ return Number(document.getElementById(id).value) || 0; }

function loadTargets(){
  document.getElementById("goal").value = state.targets.goal;
  document.getElementById("tCal").value = state.targets.cal;
  document.getElementById("tPro").value = state.targets.pro;
  document.getElementById("tCarb").value = state.targets.carb;
  document.getElementById("tFat").value = state.targets.fat;
}
function updateTargets(){
  state.targets = {
    goal: document.getElementById("goal").value,
    cal: val("tCal"), pro: val("tPro"), carb: val("tCarb"), fat: val("tFat")
  };
  save(); render();
}

function showTab(id, btn){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function addFood(){
  state.foods.push({
    n: document.getElementById("name").value || "未命名",
    c: val("cal"), p: val("pro"), cb: val("carb"), f: val("fat"),
    date: new Date().toLocaleDateString("zh-TW")
  });
  ["name","cal","pro","carb","fat"].forEach(i=>document.getElementById(i).value="");
  save(); render();
}

function deleteFood(i){ state.foods.splice(i,1); save(); render(); }
function clearFoods(){
  if(confirm("確定要清空今日飲食嗎？")){
    state.foods = [];
    save(); render();
  }
}

function saveWeight(){
  const w = val("weightInput");
  if(!w) return;
  state.weights.push({d:new Date().toLocaleDateString("zh-TW"), w});
  document.getElementById("weightInput").value="";
  save(); render();
}

function bar(title,total,target,unit){
  const pct = target > 0 ? Math.min(total / target * 100, 100) : 0;
  const remain = target - total;
  const status = remain >= 0 ? `<span class="ok">剩餘 ${remain.toFixed(1)} ${unit}</span>` : `<span class="over">已超過 ${Math.abs(remain).toFixed(1)} ${unit}</span>`;
  return `<div><b>${title}</b>：${total.toFixed(1)} / ${target} ${unit}<div class="progress"><div class="fill" style="width:${pct}%"></div></div>${status}</div><br>`;
}

function render(){
  let tc=0,tp=0,tcb=0,tf=0, rows="";
  state.foods.forEach((x,i)=>{
    tc+=x.c; tp+=x.p; tcb+=x.cb; tf+=x.f;
    rows += `<tr><td>${x.n}</td><td>${x.c}</td><td>${x.p}</td><td>${x.cb}</td><td>${x.f}</td><td><button class="red smallbtn" onclick="deleteFood(${i})">刪</button></td></tr>`;
  });
  document.getElementById("foods").innerHTML = rows || `<tr><td colspan="6">尚未新增食物</td></tr>`;
  document.getElementById("stats").innerHTML =
    bar("熱量",tc,state.targets.cal,"kcal")+
    bar("蛋白質",tp,state.targets.pro,"g")+
    bar("碳水",tcb,state.targets.carb,"g")+
    bar("脂肪",tf,state.targets.fat,"g");
  document.getElementById("weightList").innerHTML = state.weights.length
    ? state.weights.slice().reverse().map(x=>`${x.d}：${x.w} kg`).join("<br>")
    : "尚未紀錄體重";
}

function exportData(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "nutrition_pwa_backup.json"; a.click();
  URL.revokeObjectURL(url);
}

function clearAll(){
  if(confirm("確定要清除全部資料嗎？這個動作不能復原。")){
    localStorage.removeItem(storeKey);
    state = {foods:[],weights:[],targets:{goal:"fatloss",cal:1800,pro:100,carb:200,fat:55}};
    loadTargets(); render();
  }
}

["goal","tCal","tPro","tCarb","tFat"].forEach(id=>document.getElementById(id).addEventListener("input",updateTargets));
loadTargets();
render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("./service-worker.js"));
}
</script>
</body>
</html>
