<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#111827" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Nutrition" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<title>Nutrition Tracker v2.1</title>
<style>
:root{--bg:#f5f5f7;--card:#fff;--text:#111827;--muted:#6b7280;--blue:#2563eb;--green:#16a34a;--yellow:#ca8a04;--orange:#ea580c;--red:#dc2626;--line:#e5e7eb;--soft:#f3f4f6}
*{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",Arial,sans-serif;color:var(--text)}
.app{max-width:760px;margin:0 auto;padding:18px 14px 96px}.header{position:sticky;top:0;z-index:5;background:rgba(245,245,247,.88);backdrop-filter:blur(14px);padding:14px 4px 10px}.header h1{margin:0;font-size:28px}.header p{margin:4px 0 0;color:var(--muted)}
.card{background:var(--card);border-radius:22px;padding:16px;margin:14px 0;box-shadow:0 8px 24px rgba(0,0,0,.06)}.summaryCard{background:#111827;color:white}.summaryCard p{margin:6px 0 0;color:#d1d5db}.summaryStatus{font-size:25px;font-weight:900}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.rangeGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.metric{margin-bottom:16px;background:#fafafa;border:1px solid #eef0f3;border-radius:18px;padding:13px}.metricTop{display:flex;justify-content:space-between;align-items:baseline;gap:10px}.metric b{font-size:17px}.metric span{color:var(--muted);font-size:14px}
.bar{height:12px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin:10px 0}.fill{height:100%;width:0%}.fill.low{background:var(--yellow)}.fill.ideal{background:var(--green)}.fill.high{background:var(--orange)}.fill.danger{background:var(--red)}
.status{font-size:13px;color:var(--muted);line-height:1.45}.badge{display:inline-block;border-radius:999px;padding:5px 8px;font-size:12px;font-weight:800;margin-top:6px}.badge.low{background:#fef3c7;color:#92400e}.badge.ideal{background:#dcfce7;color:#166534}.badge.high{background:#ffedd5;color:#9a3412}.badge.danger{background:#fee2e2;color:#991b1b}
.mealTitle{display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-weight:800;font-size:18px}.foodCard{border-top:1px solid var(--line);padding:12px 0}.foodName{font-weight:800;font-size:17px}.foodSub{color:var(--muted);font-size:13px;margin-top:4px}.macroRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.pill{background:var(--soft);border-radius:999px;padding:6px 9px;font-size:13px}.actions{display:flex;gap:8px;margin-top:10px}.actions button{flex:1}
button,input,select{font:inherit}button{border:0;border-radius:14px;padding:11px 13px;font-weight:800;background:var(--blue);color:white}button.gray{background:#e5e7eb;color:#111827}button.red{background:var(--red)}input,select{width:100%;border:1px solid #d1d5db;border-radius:14px;padding:12px;background:white}label{display:block;font-weight:750;font-size:13px;margin-bottom:5px;color:#374151}
.fab{position:fixed;right:22px;bottom:26px;width:62px;height:62px;border-radius:50%;font-size:34px;box-shadow:0 12px 28px rgba(37,99,235,.35);z-index:20}.sheetBg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:30}.sheet{position:absolute;left:0;right:0;bottom:0;background:white;border-radius:28px 28px 0 0;padding:18px 16px 26px;max-width:760px;margin:auto;max-height:88vh;overflow:auto}.sheetHandle{width:42px;height:5px;background:#d1d5db;border-radius:999px;margin:0 auto 12px}.sheetHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.sheetHead h2{margin:0}.small{font-size:13px;color:var(--muted);line-height:1.5}
.bottomNav{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.9);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;justify-content:center;z-index:15}.bottomNavInner{max-width:760px;width:100%;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:8px 8px max(8px,env(safe-area-inset-bottom))}.navBtn{background:transparent;color:#6b7280;padding:8px;border-radius:14px}.navBtn.active{background:#eef2ff;color:var(--blue)}.section{display:none}.section.active{display:block}.dateRow{display:flex;gap:8px;align-items:center}.dateRow input{flex:1}.settingBlock{border-top:1px solid var(--line);padding-top:14px;margin-top:14px}.settingBlock h3{margin:0 0 10px}
</style>
</head>
<body>
<div class="app">
<div class="header"><h1 data-i18n="title">Nutrition Tracker</h1><p id="dateLabel"></p></div>
<section id="tab-dashboard" class="section active">
<div class="card"><div class="dateRow"><input id="currentDate" type="date"><button class="gray" onclick="goToday()" data-i18n="todayBtn">今天</button></div></div>
<div class="card summaryCard"><div class="summaryStatus" id="summaryTitle"></div><p id="summaryText"></p></div>
<div class="card"><h2 data-i18n="dashboard">Smart Target Range</h2><div id="metrics"></div></div><div id="mealList"></div>
</section>
<section id="tab-weight" class="section"><div class="card"><h2 data-i18n="weight">體重</h2><label data-i18n="todayWeight">今日體重 kg</label><input id="weightInput" type="number" step="0.1" placeholder="69.5"><br><br><button onclick="saveWeight()" data-i18n="save">儲存</button></div><div class="card"><h2 data-i18n="recentWeight">近期體重</h2><div id="weightList"></div></div></section>
<section id="tab-settings" class="section"><div class="card"><h2 data-i18n="settings">設定</h2><label>Language</label><select id="lang" onchange="setLang(this.value)"><option value="zh">中文</option><option value="id">Bahasa Indonesia</option></select><p class="small" data-i18n="rangeNote">每項營養素請設定：最低值、理想上限、最高值。</p><div id="rangeSettings"></div><br><button onclick="saveRanges()" data-i18n="saveTarget">儲存目標區間</button></div></section>
<section id="tab-backup" class="section"><div class="card"><h2 data-i18n="backup">備份</h2><button onclick="exportData()" data-i18n="export">匯出 JSON</button><br><br><button class="red" onclick="clearAll()" data-i18n="clearAll">清除全部資料</button><p class="small" data-i18n="backupNote">資料儲存在本機瀏覽器，請定期備份。</p></div></section>
</div>
<button class="fab" onclick="openSheet()">＋</button>
<div class="sheetBg" id="sheetBg" onclick="closeSheet(event)"><div class="sheet" onclick="event.stopPropagation()"><div class="sheetHandle"></div><div class="sheetHead"><h2 data-i18n="addFood">新增食物</h2><button class="gray" onclick="hideSheet()">✕</button></div><input type="hidden" id="editId"><label data-i18n="meal">餐別</label><select id="meal"><option value="breakfast" data-i18n="breakfast">早餐</option><option value="lunch" data-i18n="lunch">午餐</option><option value="dinner" data-i18n="dinner">晚餐</option><option value="snack" data-i18n="snack">點心</option></select><br><br><label data-i18n="foodName">食物名稱</label><input id="foodName"><br><br><div class="grid"><div><label data-i18n="weightG">重量 g</label><input id="foodWeight" type="number" step="0.1"></div><div><label data-i18n="cal">熱量</label><input id="foodCal" type="number" step="0.1"></div><div><label data-i18n="protein">蛋白質</label><input id="foodPro" type="number" step="0.1"></div><div><label data-i18n="carbs">碳水</label><input id="foodCarb" type="number" step="0.1"></div><div><label data-i18n="fat">脂肪</label><input id="foodFat" type="number" step="0.1"></div><div><label data-i18n="note">備註</label><input id="foodNote"></div></div><br><button onclick="saveFood()" data-i18n="add">加入</button></div></div>
<div class="bottomNav"><div class="bottomNavInner"><button class="navBtn active" onclick="showTab('dashboard',this)" data-i18n="navHome">首頁</button><button class="navBtn" onclick="showTab('weight',this)" data-i18n="navWeight">體重</button><button class="navBtn" onclick="showTab('settings',this)" data-i18n="navSettings">設定</button><button class="navBtn" onclick="showTab('backup',this)" data-i18n="navBackup">備份</button></div></div>
<script>
const I={zh:{title:"Nutrition Tracker",todayBtn:"今天",dashboard:"Smart Target Range",weight:"體重",todayWeight:"今日體重 kg",save:"儲存",recentWeight:"近期體重",settings:"設定",rangeNote:"每項營養素請設定：最低值、理想上限、最高值。",min:"最低值",idealMax:"理想上限",max:"最高值",cal:"熱量",protein:"蛋白質",carbs:"碳水",fat:"脂肪",saveTarget:"儲存目標區間",backup:"備份",export:"匯出 JSON",clearAll:"清除全部資料",backupNote:"資料儲存在本機瀏覽器，請定期備份。",addFood:"新增食物",meal:"餐別",breakfast:"早餐",lunch:"午餐",dinner:"晚餐",snack:"點心",foodName:"食物名稱",weightG:"重量 g",note:"備註",add:"加入",navHome:"首頁",navWeight:"體重",navSettings:"設定",navBackup:"備份",need:"還差",canEat:"還可攝取",overBy:"已超過",ideal:"理想區間",low:"偏低",high:"稍高",danger:"過高",excellent:"🟢 今日狀態理想",good:"🟡 今日仍需補足",attention:"🔴 今日需要注意",allIdeal:"所有營養素都落在理想區間。",needFocus:"優先補足",tooHigh:"超出最高值",edit:"編輯",del:"刪除",noFood:"尚未新增食物",confirmDel:"確定刪除？",confirmAll:"確定清除全部資料？",noWeight:"尚未紀錄體重"},id:{title:"Nutrition Tracker",todayBtn:"Hari ini",dashboard:"Smart Target Range",weight:"Berat",todayWeight:"Berat hari ini kg",save:"Simpan",recentWeight:"Berat terbaru",settings:"Pengaturan",rangeNote:"Untuk tiap nutrisi, atur: minimum, batas ideal, dan maksimum.",min:"Minimum",idealMax:"Batas ideal",max:"Maksimum",cal:"Kalori",protein:"Protein",carbs:"Karbo",fat:"Lemak",saveTarget:"Simpan target",backup:"Cadangan",export:"Ekspor JSON",clearAll:"Hapus semua data",backupNote:"Data tersimpan di browser perangkat ini. Sebaiknya lakukan cadangan secara rutin.",addFood:"Tambah makanan",meal:"Waktu makan",breakfast:"Sarapan",lunch:"Makan siang",dinner:"Makan malam",snack:"Camilan",foodName:"Nama makanan",weightG:"Berat g",note:"Catatan",add:"Tambah",navHome:"Beranda",navWeight:"Berat",navSettings:"Pengaturan",navBackup:"Cadangan",need:"Kurang",canEat:"Masih bisa",overBy:"Melebihi",ideal:"Ideal",low:"Rendah",high:"Agak tinggi",danger:"Terlalu tinggi",excellent:"🟢 Kondisi hari ini ideal",good:"🟡 Masih perlu dilengkapi",attention:"🔴 Perlu diperhatikan",allIdeal:"Semua nutrisi berada dalam rentang ideal.",needFocus:"Prioritaskan",tooHigh:"Melebihi maksimum",edit:"Edit",del:"Hapus",noFood:"Belum ada makanan",confirmDel:"Yakin hapus?",confirmAll:"Yakin hapus semua data?",noWeight:"Belum ada catatan berat"}};
const KEY="nutrition_tracker_v2_1";let old=JSON.parse(localStorage.getItem("nutrition_tracker_v2")||"{}");let S=JSON.parse(localStorage.getItem(KEY)||"{}");S.lang ||= old.lang || "zh";S.days ||= old.days || {};S.weights ||= old.weights || {};S.collapsed ||= old.collapsed || {};S.ranges ||= {cal:{min:2500,idealMax:2800,max:3000,unit:"kcal"},pro:{min:140,idealMax:160,max:170,unit:"g"},carb:{min:320,idealMax:380,max:420,unit:"g"},fat:{min:60,idealMax:80,max:90,unit:"g"}};let D=new Date().toISOString().slice(0,10);
function t(k){return I[S.lang][k]||k}function save(){localStorage.setItem(KEY,JSON.stringify(S))}function num(id){return Number(document.getElementById(id).value)||0}function day(){S.days[D] ||= []; return S.days[D]}function defs(){return [{key:"cal",label:t("cal"),field:"cal",unit:"kcal"},{key:"pro",label:t("protein"),field:"pro",unit:"g"},{key:"carb",label:t("carbs"),field:"carb",unit:"g"},{key:"fat",label:t("fat"),field:"fat",unit:"g"}]}
function applyLang(){document.documentElement.lang=S.lang==="id"?"id":"zh-Hant";document.querySelectorAll("[data-i18n]").forEach(e=>e.textContent=t(e.dataset.i18n));document.getElementById("lang").value=S.lang;buildRangeSettings();render()}function setLang(v){S.lang=v;save();applyLang()}
function showTab(name,btn){document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));document.getElementById("tab-"+name).classList.add("active");document.querySelectorAll(".navBtn").forEach(b=>b.classList.remove("active"));btn.classList.add("active")}function goToday(){D=new Date().toISOString().slice(0,10);document.getElementById("currentDate").value=D;render()}document.getElementById("currentDate").addEventListener("change",e=>{D=e.target.value;render()});
function analyze(v,r){if(v<r.min)return{level:"low",badge:t("low"),need:r.min-v,can:r.idealMax-v,over:0};if(v<=r.idealMax)return{level:"ideal",badge:t("ideal"),need:0,can:r.idealMax-v,over:0};if(v<=r.max)return{level:"high",badge:t("high"),need:0,can:r.max-v,over:v-r.idealMax};return{level:"danger",badge:t("danger"),need:0,can:0,over:v-r.max}}
function metric(d,total){const r=S.ranges[d.key],a=analyze(total,r),pct=r.max?Math.min(total/r.max*100,100):0;let detail=a.level==="danger"?`${t("overBy")} ${a.over.toFixed(1)} ${r.unit}`:`${t("need")} ${a.need.toFixed(1)} ${r.unit}｜${t("canEat")} ${Math.max(a.can,0).toFixed(1)} ${r.unit}`;return `<div class="metric"><div class="metricTop"><b>${d.label}</b><span>${total.toFixed(1)} ${r.unit}</span></div><div class="bar"><div class="fill ${a.level}" style="width:${pct}%"></div></div><div class="status">Range: ${r.min}–${r.idealMax} ${r.unit}｜Max ${r.max} ${r.unit}<br>${detail}<br><span class="badge ${a.level}">${a.badge}</span></div></div>`}
function totals(){let out={cal:0,pro:0,carb:0,fat:0};day().forEach(x=>{out.cal+=x.cal;out.pro+=x.pro;out.carb+=x.carb;out.fat+=x.fat});return out}
function renderSummary(ts){let res=defs().map(d=>({d,a:analyze(ts[d.field],S.ranges[d.key])}));let danger=res.filter(x=>x.a.level==="danger"),low=res.filter(x=>x.a.level==="low"),high=res.filter(x=>x.a.level==="high");if(danger.length){summaryTitle.textContent=t("attention");summaryText.textContent=`${t("tooHigh")}：${danger.map(x=>x.d.label).join("、")}`}else if(low.length){summaryTitle.textContent=t("good");summaryText.textContent=`${t("needFocus")}：${low.map(x=>x.d.label).join("、")}`}else if(high.length){summaryTitle.textContent=t("good");summaryText.textContent=`${high.map(x=>x.d.label).join("、")} ${t("high")}`}else{summaryTitle.textContent=t("excellent");summaryText.textContent=t("allIdeal")}}
function render(){currentDate.value=D;dateLabel.textContent=D;let ts=totals();renderSummary(ts);metrics.innerHTML=defs().map(d=>metric(d,ts[d.field])).join("");let meals=["breakfast","lunch","dinner","snack"],list=day(),html="";meals.forEach(m=>{let items=list.filter(x=>x.meal===m),collapsed=S.collapsed[D+"_"+m];html+=`<div class="card"><div class="mealTitle" onclick="toggleMeal('${m}')"><span>${collapsed?"▶":"▼"} ${t(m)} (${items.length})</span></div>`;if(!collapsed){if(!items.length)html+=`<p class="small">${t("noFood")}</p>`;items.forEach(x=>{html+=`<div class="foodCard"><div class="foodName">${x.name}</div><div class="foodSub">${x.weight||0} g ${x.note?"｜"+x.note:""}</div><div class="macroRow"><span class="pill">${x.cal} kcal</span><span class="pill">P ${x.pro}</span><span class="pill">C ${x.carb}</span><span class="pill">F ${x.fat}</span></div><div class="actions"><button class="gray" onclick="editFood('${x.id}')">${t("edit")}</button><button class="red" onclick="deleteFood('${x.id}')">${t("del")}</button></div></div>`})}html+="</div>"});mealList.innerHTML=html;let ws=Object.entries(S.weights).sort().reverse().slice(0,10);weightList.innerHTML=ws.length?ws.map(([d,w])=>`${d}：${w} kg`).join("<br>"):t("noWeight")}
function buildRangeSettings(){rangeSettings.innerHTML=defs().map(d=>{let r=S.ranges[d.key];return `<div class="settingBlock"><h3>${d.label}</h3><div class="rangeGrid"><div><label>${t("min")}</label><input id="range_${d.key}_min" type="number" step="0.1" value="${r.min}"></div><div><label>${t("idealMax")}</label><input id="range_${d.key}_idealMax" type="number" step="0.1" value="${r.idealMax}"></div><div><label>${t("max")}</label><input id="range_${d.key}_max" type="number" step="0.1" value="${r.max}"></div></div></div>`}).join("")}
function saveRanges(){defs().forEach(d=>{S.ranges[d.key].min=num(`range_${d.key}_min`);S.ranges[d.key].idealMax=num(`range_${d.key}_idealMax`);S.ranges[d.key].max=num(`range_${d.key}_max`)});save();render()}
function toggleMeal(m){S.collapsed[D+"_"+m]=!S.collapsed[D+"_"+m];save();render()}function openSheet(){editId.value="";["foodName","foodWeight","foodCal","foodPro","foodCarb","foodFat","foodNote"].forEach(id=>document.getElementById(id).value="");sheetBg.style.display="block";setTimeout(()=>foodName.focus(),100)}function hideSheet(){sheetBg.style.display="none"}function closeSheet(e){if(e.target.id==="sheetBg")hideSheet()}
function saveFood(){let id=editId.value || crypto.randomUUID();let obj={id,meal:meal.value,name:foodName.value||"Food",weight:num("foodWeight"),cal:num("foodCal"),pro:num("foodPro"),carb:num("foodCarb"),fat:num("foodFat"),note:foodNote.value};let arr=day(),i=arr.findIndex(x=>x.id===id);if(i>=0)arr[i]=obj;else arr.push(obj);save();hideSheet();render()}
function editFood(id){let x=day().find(a=>a.id===id);if(!x)return;editId.value=x.id;meal.value=x.meal;foodName.value=x.name;foodWeight.value=x.weight;foodCal.value=x.cal;foodPro.value=x.pro;foodCarb.value=x.carb;foodFat.value=x.fat;foodNote.value=x.note||"";sheetBg.style.display="block"}function deleteFood(id){if(confirm(t("confirmDel"))){S.days[D]=day().filter(x=>x.id!==id);save();render()}}
function saveWeight(){S.weights[D]=num("weightInput");weightInput.value="";save();render()}function exportData(){let blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download="nutrition_tracker_v2_1_backup.json";a.click();URL.revokeObjectURL(url)}function clearAll(){if(confirm(t("confirmAll"))){localStorage.removeItem(KEY);location.reload()}}document.addEventListener("keydown",e=>{if(e.key==="Escape")hideSheet()});buildRangeSettings();applyLang();save();if("serviceWorker"in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./service-worker.js"))}
</script>
</body></html>
